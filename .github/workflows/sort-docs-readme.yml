name: Sort Docs README List

on:
  push:
    paths:
      - 'docs/**.md'
  pull_request:
    paths:
      - 'docs/**.md'

permissions:
  contents: write

jobs:
  sort-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Sort docs list
        run: |
          python -c '
          import re
          
          file_path = "docs/README.md"
          template_path = "docs/README-TEMPLATE.md"
          
          with open(file_path, "r", encoding="utf-8") as f:
              content = f.read()
              
          with open(template_path, "r", encoding="utf-8") as f:
              template_content = f.read()
              
          pattern = r"^(.*?(?:### 문서 목록\s*\n+))(.*?)(?:\n+---.*)?$"
          
          def sort_and_merge(match):
              header = match.group(1)
              list_content = match.group(2)
              
              lines = [line.strip() for line in list_content.split("\n") if line.strip().startswith("-")]
              lines.sort(key=lambda x: x.lower())
              
              return header + "\n".join(lines) + "\n\n" + template_content
              
          new_content = re.sub(pattern, sort_and_merge, content, flags=re.DOTALL)
          
          with open(file_path, "w", encoding="utf-8") as f:
              f.write(new_content)
          '

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(readme): auto-sort docs list"
          file_pattern: 'docs/README.md'
